name: Auto Release

# Stage 2 of SOFTWARE_RELEASE.md: the SINGLE, race-free release creator.
# scripts/Invoke-Release.ps1 (Stage 1) builds + stages the installer under
# releases/latest/ and pushes. That push fires this workflow, which scans the
# installer with VirusTotal and creates the GitHub Release. Nothing else ever
# calls "gh release create". workflow_dispatch allows a manual re-run against
# the installer already staged in releases/latest/.
#
# NOTE: untrusted/complex values (the changelog body, which is full of
# backticks) are passed via env vars and a notes FILE, never interpolated into
# a shell command -- otherwise bash performs command substitution on the
# backticks and the step dies.

on:
  push:
    branches: [main]
    paths:
      - 'releases/latest/*.exe'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Identify installer + version
        id: meta
        run: |
          file=$(ls releases/latest/*.exe | head -n1)
          base=$(basename "$file")
          ver=$(echo "$base" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          {
            echo "file=$file"
            echo "base=$base"
            echo "version=$ver"
          } >> "$GITHUB_OUTPUT"
          echo "Installer: $base  (v$ver)"

      - name: Skip if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v$VERSION already exists - skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: VirusTotal scan
        if: steps.exists.outputs.exists == 'false'
        id: vt
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          FILE: ${{ steps.meta.outputs.file }}
        run: |
          set -e
          sha=$(sha256sum "$FILE" | cut -d' ' -f1)
          gui="https://www.virustotal.com/gui/file/$sha"
          verdict="scan skipped (no API key configured)"
          if [ -n "$VT_API_KEY" ]; then
            echo "Requesting large-file upload URL..."
            up=$(curl -s --request GET --url https://www.virustotal.com/api/v3/files/upload_url --header "x-apikey: $VT_API_KEY" | jq -r .data)
            echo "Uploading installer for analysis..."
            aid=$(curl -s --request POST --url "$up" --header "x-apikey: $VT_API_KEY" --form file=@"$FILE" | jq -r .data.id)
            echo "Analysis id: $aid"
            verdict="scan inconclusive (timed out)"
            for i in $(seq 1 30); do
              sleep 10
              resp=$(curl -s --url "https://www.virustotal.com/api/v3/analyses/$aid" --header "x-apikey: $VT_API_KEY")
              status=$(echo "$resp" | jq -r '.data.attributes.status // "queued"')
              echo "  poll $i: $status"
              if [ "$status" = "completed" ]; then
                mal=$(echo "$resp" | jq -r '.data.attributes.stats.malicious // 0')
                susp=$(echo "$resp" | jq -r '.data.attributes.stats.suspicious // 0')
                undet=$(echo "$resp" | jq -r '.data.attributes.stats.undetected // 0')
                verdict="$mal malicious, $susp suspicious, $undet clean"
                break
              fi
            done
          fi
          {
            echo "sha256=$sha"
            echo "gui=$gui"
            echo "verdict=$verdict"
          } >> "$GITHUB_OUTPUT"
          echo "VirusTotal: $verdict"

      - name: Build release notes from CHANGELOG
        if: steps.exists.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          BASE: ${{ steps.meta.outputs.base }}
          VERDICT: ${{ steps.vt.outputs.verdict }}
          GUI: ${{ steps.vt.outputs.gui }}
          SHA: ${{ steps.vt.outputs.sha256 }}
        run: |
          section=$(awk -v v="$VERSION" '
            $0 ~ ("^## \\[" v "\\]") { p=1; next }
            p && /^## \[/ { p=0 }
            p { print }
          ' docs/CHANGELOG.md)
          {
            if [ -n "$section" ]; then printf '%s\n' "$section"; else echo "Release v$VERSION."; fi
            echo ""
            echo "---"
            printf '**Download:** `%s` - a per-user Windows installer (choose your install folder; optional desktop + Start-Menu shortcuts; clean uninstall).\n' "$BASE"
            echo ""
            printf '**VirusTotal:** %s - [full report](%s)\n' "$VERDICT" "$GUI"
            printf 'SHA-256: `%s`\n' "$SHA"
          } > "$RUNNER_TEMP/release-notes.md"
          echo "----- release notes -----"
          cat "$RUNNER_TEMP/release-notes.md"

      - name: Create GitHub Release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          FILE: ${{ steps.meta.outputs.file }}
        run: |
          gh release create "v$VERSION" "$FILE" \
            --title "StripKit $VERSION" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
          echo "Created release v$VERSION"
