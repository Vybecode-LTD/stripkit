name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore StripKit.sln

      - name: Build
        run: dotnet build StripKit.sln -c Debug --nologo --no-restore

      - name: Test
        run: dotnet test StripKit.sln --nologo --no-build -c Debug
